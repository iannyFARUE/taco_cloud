<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Design Your Taco – Taco Cloud</title>
    <link rel="stylesheet" th:href="@{/styles.css}"/>
</head>
<body>

<header class="hero">
    <img class="logo" th:src="@{/images/TacoCloud.png}" alt="Taco Cloud"/>
    <h1>Design Your Taco</h1>
    <p class="tagline">Stack it. Name it. Own it.</p>
</header>

<main>
    <form method="POST" th:object="${design}">

        <div class="grid">

            <div class="ingredient-group" id="wraps">
                <h3>🌯 Wrap</h3>
                <div th:each="ingredient : ${wrap}">
                    <label>
                        <input name="ingredients" type="checkbox" th:value="${ingredient.id}"/>
                        <span th:text="${ingredient.name}">INGREDIENT</span>
                    </label>
                </div>
            </div>

            <div class="ingredient-group" id="proteins">
                <h3>🥩 Protein</h3>
                <div th:each="ingredient : ${protein}">
                    <label>
                        <input name="ingredients" type="checkbox" th:value="${ingredient.id}"/>
                        <span th:text="${ingredient.name}">INGREDIENT</span>
                    </label>
                </div>
            </div>

            <div class="ingredient-group" id="cheeses">
                <h3>🧀 Cheese</h3>
                <div th:each="ingredient : ${cheese}">
                    <label>
                        <input name="ingredients" type="checkbox" th:value="${ingredient.id}"/>
                        <span th:text="${ingredient.name}">INGREDIENT</span>
                    </label>
                </div>
            </div>

            <div class="ingredient-group" id="veggies">
                <h3>🥦 Veggies</h3>
                <div th:each="ingredient : ${veggies}">
                    <label>
                        <input name="ingredients" type="checkbox" th:value="${ingredient.id}"/>
                        <span th:text="${ingredient.name}">INGREDIENT</span>
                    </label>
                </div>
            </div>

            <div class="ingredient-group" id="sauces">
                <h3>🫙 Sauce</h3>
                <div th:each="ingredient : ${sauce}">
                    <label>
                        <input name="ingredients" type="checkbox" th:value="${ingredient.id}"/>
                        <span th:text="${ingredient.name}">INGREDIENT</span>
                    </label>
                </div>
            </div>

        </div>

        <div class="name-section">
            <h3>Name your masterpiece</h3>
            <input type="text" th:field="*{name}" placeholder="e.g. The Inferno Supreme"/>
            <span class="validationError"
                  th:if="${#fields.hasErrors('name')}"
                  th:errors="*{name}">Name Error</span>
            <span class="validationError"
                  th:if="${#fields.hasErrors('ingredients')}"
                  th:errors="*{ingredients}">Ingredients Error</span>
            <button type="submit">Submit Taco 🌮</button>
        </div>

    </form>
</main>

</body>
</html>
